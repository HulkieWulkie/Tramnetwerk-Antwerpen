<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tramnet Antwerpen · De Lijn</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#08090d;color:#dde}

/* ── HEADER ── */
#hd{
  height:52px;background:#0c0e16;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:14px;padding:0 16px;flex-shrink:0;
  position:relative;z-index:1000;
}
#hd::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    #8C2B87 0% 7%,#15882E 7% 14%,#FFCC00 14% 21%,#00A6E2 21% 29%,
    #822A3A 29% 36%,#E6007E 36% 43%,#0056A4 43% 50%,#FC95C5 50% 57%,
    #EF7D00 57% 64%,#C8D300 64% 71%,#FFFFFF 71% 79%,#E40521 79% 86%,
    #556B2F 86% 93%,#005460 93% 100%);
}
.htitle{
  font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:#fff;white-space:nowrap;
}
.hsep{width:1px;height:22px;background:rgba(255,255,255,.1)}
.hsub{font-size:.6rem;color:#445;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.hsp{flex:1}
.hstat{text-align:right}
.hstat b{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:#f0db50;display:block;line-height:1}
.hstat small{font-size:.53rem;color:#445;text-transform:uppercase;letter-spacing:.06em}
.hbadge{
  display:flex;align-items:center;gap:5px;background:rgba(240,219,80,.08);
  border:1px solid rgba(240,219,80,.22);border-radius:20px;padding:4px 10px;
  font-size:.58rem;font-weight:600;color:#f0db50;letter-spacing:.06em;text-transform:uppercase;
}
.hdot{width:5px;height:5px;border-radius:50%;background:#f0db50;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── LAYOUT ── */
#wrap{display:flex;height:calc(100% - 52px)}

/* ── SIDEBAR ── */
#sb{
  width:248px;flex-shrink:0;background:#0c0e16;
  border-right:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
}
.sbh{padding:10px 12px 8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sbbts{display:flex;gap:5px;margin-bottom:8px}
.sbbt{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:7px;color:#667;font-family:'Inter',sans-serif;font-size:.62rem;
  font-weight:500;padding:6px 4px;cursor:pointer;transition:all .13s;text-align:center;
}
.sbbt:hover{background:rgba(255,255,255,.07);color:#99a}
.sbbt.on{background:rgba(240,219,80,.12);border-color:rgba(240,219,80,.3);color:#f0db50}
.sbsearch{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;color:#dde;font-family:'Inter',sans-serif;font-size:.72rem;
  padding:7px 10px;outline:none;
}
.sbsearch::placeholder{color:#334}
.sbl{
  flex:1;overflow-y:auto;padding:8px 8px 20px;
}
.sbl::-webkit-scrollbar{width:3px}
.sbl::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
.sblabel{font-size:.52rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#334;padding:10px 4px 6px}

/* ── LINE ITEM ── */
.li{
  display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;
  cursor:pointer;margin-bottom:2px;border:1px solid transparent;
  transition:background .12s,border-color .12s,opacity .15s;
}
.li:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07)}
.li.on{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.li.off{opacity:.22}
.libadge{
  width:30px;height:22px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:.92rem;
  font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,.1);
}
.litxt{flex:1;min-width:0}
.liname{font-size:.67rem;font-weight:500;color:#ccd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litag{display:inline-block;font-size:.5rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;letter-spacing:.04em}
.tw{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.to{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.licheck{
  width:14px;height:14px;flex-shrink:0;border:1.5px solid #334;border-radius:3px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.li.on .licheck{background:#f0db50;border-color:#f0db50}
.licheck::after{content:'';display:none;width:6px;height:4px;border-left:1.5px solid #000;border-bottom:1.5px solid #000;transform:rotate(-45deg) translate(.5px,-.5px)}
.li.on .licheck::after{display:block}

/* ── MAP ── */
#mw{flex:1;position:relative}
#map{width:100%;height:100%}

/* ── INFO CARD ── */
#ic{
  position:absolute;bottom:20px;right:14px;z-index:900;width:268px;
  background:#0c0e16;border:1px solid rgba(255,255,255,.12);border-radius:14px;
  overflow:hidden;opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .2s,transform .2s;
}
#ic.show{opacity:1;pointer-events:all;transform:translateY(0)}
.ich{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);position:relative}
.icn{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:700;line-height:1;margin-bottom:3px}
.icname{font-size:.78rem;font-weight:600;color:#dde;line-height:1.3;margin-bottom:2px}
.iccl{
  position:absolute;top:10px;right:10px;background:rgba(255,255,255,.06);
  border:none;color:#556;width:22px;height:22px;border-radius:50%;cursor:pointer;
  font-size:.75rem;display:flex;align-items:center;justify-content:center;
}
.iccl:hover{background:rgba(255,255,255,.12);color:#99a}
.icb{padding:10px 14px 14px}
.icnote{font-size:.65rem;color:#778;line-height:1.6;margin-bottom:8px}
.icsb{font-size:.62rem;font-weight:500;padding:6px 10px;border-radius:7px;line-height:1.4}
.icsb.ok{background:rgba(74,222,128,.08);color:#86efac;border:1px solid rgba(74,222,128,.2)}
.icsb.warn{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.icsb.out{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.22)}

/* ── LEGEND ── */
#leg{
  position:absolute;bottom:20px;left:14px;z-index:900;
  background:rgba(12,14,22,.93);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:10px 13px;backdrop-filter:blur(10px);
}
.lr{display:flex;align-items:center;gap:8px;font-size:.6rem;color:#667;margin-bottom:5px}
.lr:last-child{margin-bottom:0}
.ll{width:22px;height:3px;border-radius:2px;flex-shrink:0}
.ld{width:22px;height:3px;flex-shrink:0;background:repeating-linear-gradient(90deg,#EF7D00 0,#EF7D00 5px,transparent 5px,transparent 9px)}
.lg{width:22px;height:3px;border-radius:2px;background:#252b3a;flex-shrink:0}

/* ── LEAFLET ── */
.leaflet-control-zoom{border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5)!important}
.leaflet-control-zoom a{background:#0c0e16!important;color:#667!important;border-color:rgba(255,255,255,.07)!important;font-family:'Barlow Condensed',sans-serif!important;font-size:1.1rem!important;font-weight:600!important;width:30px!important;height:30px!important;line-height:30px!important}
.leaflet-control-zoom a:hover{background:#161b26!important;color:#99a!important}
.leaflet-control-attribution{background:rgba(8,9,13,.85)!important;color:#334!important;font-size:.53rem!important;border-radius:6px 0 0 0!important}
.leaflet-control-attribution a{color:#445!important}
.htt{background:#0c0e16!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:7px!important;color:#99aabb!important;font-family:'Inter',sans-serif!important;font-size:.64rem!important;padding:4px 9px!important;box-shadow:0 6px 20px rgba(0,0,0,.7)!important;white-space:nowrap!important}
.htt::before{display:none!important}
</style>
</head>
<body>

<div id="hd">
  <div class="htitle">Tramnet Antwerpen</div>
  <div class="hsep"></div>
  <div class="hsub">De Lijn · Maart 2026</div>
  <div class="hsp"></div>
  <div class="hstat"><b>14</b><small>Lijnen</small></div>
  <div class="hsep"></div>
  <div class="hstat"><b>75 km</b><small>Netwerk</small></div>
  <div class="hsep"></div>
  <div class="hbadge"><div class="hdot"></div>Actueel</div>
</div>

<div id="wrap">
  <div id="sb">
    <div class="sbh">
      <div class="sbbts">
        <button class="sbbt on" id="btnAll" onclick="toonAlle()">Alle</button>
        <button class="sbbt" id="btnAct" onclick="alleenActief()">Actief</button>

      </div>
      <input class="sbsearch" type="text" placeholder="Zoek lijn of bestemming…" oninput="zoek(this.value)">
    </div>
    <div class="sbl">
      <div class="sblabel">Tramlijnen — klik om te tonen/verbergen</div>
      <div id="list"></div>
    </div>
  </div>
  <div id="mw">
    <div id="map"></div>
    <div id="leg">
      <div class="lr"><div class="ll" style="background:#38bdf8"></div>Actieve lijn</div>
      <div class="lr"><div class="ld"></div>Tijdelijk ingekort</div>
      
    </div>
    <div id="ic">
      <div class="ich">
        <div class="icn" id="icn">—</div>
        <div class="icname" id="icname">—</div>
        <button class="iccl" onclick="sluit()">✕</button>
      </div>
      <div class="icb">
        <div class="icnote" id="icnote">—</div>
        <div class="icsb ok" id="icsb">—</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── MAP ──
var map = L.map('map',{center:[51.215,4.415],zoom:12,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd',maxZoom:19,opacity:.65
}).addTo(map);

// ── SEGMENT OVERLAP DETECTION ──
function rnd2(x){return Math.round(x*500)/500;} // ~200m grid for grouping
function segKey(a,b){
  var a0=rnd2(a[0]),a1=rnd2(a[1]),b0=rnd2(b[0]),b1=rnd2(b[1]);
  if(a0<b0||(a0===b0&&a1<b1))return a0+','+a1+'|'+b0+','+b1;
  return b0+','+b1+'|'+a0+','+a1;
}
var segMap={};
D.forEach(function(d,li){
  for(var i=0;i<d.pts.length-1;i++){
    var k=segKey(d.pts[i],d.pts[i+1]);
    if(!segMap[k])segMap[k]=[];
    if(segMap[k].indexOf(li)<0)segMap[k].push(li);
  }
});
var lineSegOff=D.map(function(){return{};});
Object.keys(segMap).forEach(function(k){
  var g=segMap[k];if(g.length<2)return;
  g.forEach(function(li,pos){lineSegOff[li][k]={pos:pos,total:g.length};});
});

function getLineOffsetSlots(d,li){
  var pts=d.pts,slots=new Array(pts.length).fill(0);
  var counts=new Array(pts.length).fill(0);
  for(var i=0;i<pts.length-1;i++){
    var k=segKey(pts[i],pts[i+1]);
    var oi=lineSegOff[li][k];
    if(oi&&oi.total>1){
      var center=(oi.total-1)/2.0;
      var slot=oi.pos-center;
      slots[i]+=slot; counts[i]++;
      slots[i+1]+=slot; counts[i+1]++;
    }
  }
  for(var i=0;i<slots.length;i++)if(counts[i]>0)slots[i]/=counts[i];
  // smooth slots along line to avoid jerky transitions
  for(var pass=0;pass<30;pass++){
    var s2=slots.slice();
    for(var i=1;i<slots.length-1;i++)s2[i]=(slots[i-1]+slots[i]*2+slots[i+1])/4;
    slots=s2;
  }
  return slots;
}

// ── PIXEL-SPACE OFFSET (zoom-invariant) ──
var LANE_PX = 6;

function computePixelOffsetPts(rawPts, slots){
  var z=map.getZoom();
  var result=[];
  for(var i=0;i<rawPts.length;i++){
    var slot=slots[i];
    if(Math.abs(slot)<0.01){result.push(rawPts[i]);continue;}
    var prev=rawPts[Math.max(0,i-4)];
    var next=rawPts[Math.min(rawPts.length-1,i+4)];
    var pxP=map.project(prev,z), pxN=map.project(next,z);
    var dx=pxN.x-pxP.x, dy=pxN.y-pxP.y;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len<0.5){result.push(rawPts[i]);continue;}
    var nx=-dy/len, ny=dx/len;
    var offPx=slot*LANE_PX;
    var px=map.project(rawPts[i],z);
    var newPx=L.point(px.x+nx*offPx, px.y+ny*offPx);
    result.push(map.unproject(newPx,z));
  }
  return result;
}

// ── SMOOTHING: Chaikin + Douglas-Peucker simplify first ──
function simplify(pts, tol){
  // Remove points too close together (reduces jitter)
  if(pts.length<3)return pts;
  var res=[pts[0]];
  for(var i=1;i<pts.length-1;i++){
    var a=res[res.length-1], b=pts[i];
    var la=a.lat!==undefined?a.lat:a[0], lo=a.lng!==undefined?a.lng:a[1];
    var lb=b.lat!==undefined?b.lat:b[0], lo2=b.lng!==undefined?b.lng:b[1];
    var d=Math.sqrt((la-lb)*(la-lb)+(lo-lo2)*(lo-lo2));
    if(d>tol)res.push(pts[i]);
  }
  res.push(pts[pts.length-1]);
  return res;
}

function chaikin(pts, passes){
  passes=passes||8;
  // First simplify harder to remove micro-jitter before smoothing
  pts=simplify(pts, 0.0003);
  for(var p=0;p<passes;p++){
    var res=[pts[0]];
    for(var i=0;i<pts.length-1;i++){
      var a=pts[i], b=pts[i+1];
      var la=a.lat!==undefined?a.lat:a[0], lo=a.lng!==undefined?a.lng:a[1];
      var lb=b.lat!==undefined?b.lat:b[0], lo2=b.lng!==undefined?b.lng:b[1];
      res.push([la*0.75+lb*0.25, lo*0.75+lo2*0.25]);
      res.push([la*0.25+lb*0.75, lo*0.25+lo2*0.75]);
    }
    res.push(pts[pts.length-1]);
    pts=res;
  }
  return pts;
}

function toLatLng(pt){
  return[pt.lat!==undefined?pt.lat:pt[0], pt.lng!==undefined?pt.lng:pt[1]];
}

// ── POLYLINES ──
var PL={}, ACT=new Set(), bounds=[];
var lineData=[];

D.forEach(function(d,li){
  bounds=bounds.concat(d.pts);
  var slots=getLineOffsetSlots(d,li);
  lineData.push({d:d,li:li,slots:slots});

  var col=d.c;
  var w=d.s==='out'?1.5:2.5, op=d.s==='out'?.45:.88;
  var dash=d.s==='partial'?'8 5':d.s==='out'?'5 6':null;

  var offsetted=computePixelOffsetPts(d.pts,slots);
  var latlngs=chaikin(offsetted.map(toLatLng),4);

  var pl=L.polyline(latlngs,{color:col,weight:w,opacity:op,dashArray:dash,lineJoin:'round',lineCap:'round'});
  pl.on('click',function(){infoToon(d);});
  pl.on('mouseover',function(){if(d.s!=='out'){pl.setStyle({weight:w+2,opacity:1});pl.bringToFront();}});
  pl.on('mouseout',function(){pl.setStyle({weight:w,opacity:op});});
  pl.addTo(map);
  PL[d.n]={pl:pl,d:d,w:w,op:op,li:li};
  ACT.add(d.n);
});

function recomputeAll(){
  var z=map.getZoom();
  lineData.forEach(function(ld){
    var p=PL[ld.d.n];
    if(!p||!ACT.has(ld.d.n))return;
    var offsetted=computePixelOffsetPts(ld.d.pts,ld.slots);
    var latlngs=chaikin(offsetted.map(toLatLng),4);
    p.pl.setLatLngs(latlngs);
  });
}

map.on('zoomend',recomputeAll);

if(bounds.length) map.fitBounds(L.latLngBounds(bounds).pad(.04));

function infoToon(d){

}

// ── SIDEBAR ──
var items=[];

D.forEach(function(d){

          d.s==='out'?'<span class="litag to">🔴 Herstart 4 mei 2026</span>':'';  el.innerHTML=
    '<div class="libadge" style="background:'+bg+';color:'+tc+'">'+d.n+'</div>'+
    '<div class="litxt"><div class="liname">'+d.full.split(' → ')[0]+' — '+d.full.split(' → ').slice(-1)[0]+'</div>'+tag+'</div>'+
    '<div class="licheck"></div>';
  el.addEventListener('click',function(){toggle(d.n,el)});
  el.addEventListener('mouseenter',function(){
    var p=PL[d.n];
    if(p&&ACT.has(d.n)&&d.s!=='out'){p.pl.setStyle({weight:p.w+2.5,opacity:1});p.pl.bringToFront()}
  });
  el.addEventListener('mouseleave',function(){
    var p=PL[d.n];if(p&&ACT.has(d.n)){p.pl.setStyle({weight:p.w,opacity:p.op})}
  });
  list.appendChild(el);
  items.push({el:el,d:d});
});

function toggle(n,el){
  var p=PL[n];if(!p) return;
  if(ACT.has(n)){ACT.delete(n);map.removeLayer(p.pl);el.classList.remove('on');el.classList.add('off')}
  else{
    var ld=lineData[p.li];
    if(ld){
      var offsetted=computePixelOffsetPts(ld.d.pts,ld.slots);
      var latlngs=chaikin(offsetted.map(toLatLng),4);
      p.pl.setLatLngs(latlngs);
    }
    ACT.add(n);map.addLayer(p.pl);el.classList.add('on');el.classList.remove('off');
  }
}
function toonAlle(){
  items.forEach(function(x){
    if(!map.hasLayer(PL[x.d.n].pl)) map.addLayer(PL[x.d.n].pl);
    ACT.add(x.d.n);x.el.classList.add('on');x.el.classList.remove('off');x.el.style.display='';
  });
  document.getElementById('zoek') && (document.querySelector('.sbsearch').value='');
  document.getElementById('btnAll').classList.add('on');
  document.getElementById('btnAct').classList.remove('on');
}
function alleenActief(){
  var was=document.getElementById('btnAct').classList.contains('on');
  document.getElementById('btnAct').classList.toggle('on',!was);
  document.getElementById('btnAll').classList.remove('on');
  items.forEach(function(x){
    x.el.style.display=(!was&&x.d.s!=='ok')?'none':'';
  });
}
function zoek(q){
  q=q.toLowerCase();
  items.forEach(function(x){
    x.el.style.display=x.el.dataset.q.includes(q)?'':' none';
  });
}
</script>
</body>
</html>
